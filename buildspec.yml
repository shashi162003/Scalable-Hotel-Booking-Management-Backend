version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - echo "Starting build for AirBnBApp"
      - mvn -v

  build:
    commands:
      - mvn clean package -DskipTests

  post_build:
    commands:
      - echo "Build completed successfully"

artifacts:
  files:
    - target/*.jar
  discard-paths: yes